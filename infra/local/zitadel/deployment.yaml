apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  labels:
    app: zitadel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zitadel
  template:
    metadata:
      labels:
        app: zitadel
    spec:
      initContainers:
        # Zitadel's init needs Postgres reachable; wait for it before starting.
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo 'waiting for postgres'; sleep 2; done"
      containers:
        - name: zitadel
          image: ghcr.io/zitadel/zitadel:latest
          # start-from-init: bootstrap schema/first-instance then serve.
          # --masterkeyFromEnv reads ZITADEL_MASTERKEY (from the secret).
          args:
            - start-from-init
            - --masterkeyFromEnv
            - --tlsMode
            - disabled
          ports:
            - containerPort: 8080
          # Secret supplies ZITADEL_MASTERKEY, the DB passwords, and the
          # first-instance admin password.
          envFrom:
            - secretRef:
                name: zitadel-secret
          env:
            # --- Non-secret config (safe to version) ---
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              value: postgres
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              value: "5432"
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: disable
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              value: postgres
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
              value: disable
            # Reachable from the host via the 30080 NodePort, plain HTTP.
            - name: ZITADEL_EXTERNALDOMAIN
              value: localhost
            - name: ZITADEL_EXTERNALPORT
              value: "30080"
            - name: ZITADEL_EXTERNALSECURE
              value: "false"
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
              value: zitadel-admin
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "750m"
