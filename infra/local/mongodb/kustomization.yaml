apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: marketplace-local-infra
resources:
  - pv.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
secretGenerator:
  - name: mongodb-secret
    envs:
      - .env
generatorOptions:
  # Stable Secret name (no content-hash suffix) so the Deployment's
  # envFrom.secretRef keeps resolving and applies stay idempotent.
  disableNameSuffixHash: true
