apiVersion: v1
kind: Service
metadata:
  name: otel-lgtm
spec:
  selector:
    app: otel-lgtm
  ports:
    # NodePorts follow the "30000 + last-3-digits" convention:
    # Grafana UI 3000 -> 30000, OTLP gRPC 4317 -> 30317, OTLP HTTP 4318 -> 30318.
    - name: grafana
      port: 3000
      targetPort: 3000
      nodePort: 30000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      nodePort: 30317
    - name: otlp-http
      port: 4318
      targetPort: 4318
      nodePort: 30318
  type: NodePort
