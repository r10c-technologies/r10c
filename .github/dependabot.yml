version: 2
updates:
  - package-ecosystem: "npm" # pnpm workspace, root manifest covers all packages/*
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
