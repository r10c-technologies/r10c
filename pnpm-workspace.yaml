packages:
  - 'apps/*'
  - 'packages/entifix/ts/*'
  - 'packages/business/ts/*'
  - 'packages/utils/ts/*'
  - 'packages/entifix/react/*'
  - 'packages/entifix/style'
  - 'packages/implementation/product-configuration-management/*'
  - 'implementation/product-configuration-management/*'
  - 'packages/shells/next/*'
  - 'packages/shells/effect/*'
allowBuilds:
  '@nestjs/core': false
  '@parcel/watcher': false
  '@swc/core': false
  core-js: false
  core-js-pure: false
  esbuild: true
  less: false
  msgpackr-extract: false
  # Only needed to emit the browser service worker; tests use `msw/node`.
  msw: false
  nx: false
  sharp: false
  unrs-resolver: false
autoInstallPeers: true
ignoreWorkspaceRootCheck: true
minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.62.1'
  - '@typescript-eslint/parser@8.62.1'
  - '@typescript-eslint/project-service@8.62.1'
  - '@typescript-eslint/scope-manager@8.62.1'
  - '@typescript-eslint/tsconfig-utils@8.62.1'
  - '@typescript-eslint/type-utils@8.62.1'
  - '@typescript-eslint/types@8.62.1'
  - '@typescript-eslint/typescript-estree@8.62.1'
  - '@typescript-eslint/utils@8.62.1'
  - '@typescript-eslint/visitor-keys@8.62.1'
  - 'prettier@3.9.3'
  - 'tailwindcss@4.3.2'
  - 'typescript-eslint@8.62.1'
  - jose@6.2.4
  - '@posthog/core@1.45.0'
  - '@posthog/types@1.398.0'
  - posthog-js@1.407.0
